name: Terraform Provider Tests

# This GitHub action runs your tests for each pull request and push.
# Optionally, you can turn it on using a schedule for regular testing.
on:
  pull_request:
    paths:
      - "main.go"
      - "internal/**.go"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/provider-tests.yml"
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: armis-provider-tests
  cancel-in-progress: false

# Suppress HashiCorp version-check telemetry across all jobs that run Terraform.
# Avoids needing to allowlist checkpoint-api.hashicorp.com.
env:
  CHECKPOINT_DISABLE: "1"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Harden the runner (Block egress)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            checkpoint-api.hashicorp.com:443
            codeload.github.com:443
            github.com:443
            objects.githubusercontent.com:443
            proxy.golang.org:443
            raw.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            storage.googleapis.com:443
            sum.golang.org:443

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version-file: 'go.mod'
          cache: true
      - run: go mod tidy
      - run: go mod download
      - run: go build -v .

  docs:
    name: Docs Test
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Block egress)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            checkpoint-api.hashicorp.com:443
            codeload.github.com:443
            github.com:443
            objects.githubusercontent.com:443
            proxy.golang.org:443
            raw.githubusercontent.com:443
            registry.terraform.io:443
            release-assets.githubusercontent.com:443
            releases.hashicorp.com:443
            storage.googleapis.com:443
            sum.golang.org:443

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
        id: go
      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2
        with:
          version: "3.x"
      - uses: step-security/setup-terraform@11f45fe036ccfd27d231861d38b183d405b059a9 # v4.0.0
        with:
          terraform_wrapper: false
      - name: Check if docs are up-to-date
        run: |
          task docs
          git diff
          BADDOCS=$(git status --porcelain)
          test -z "$BADDOCS" || (echo -e "documentation needs regenerating using task docs: $BADDOCS"; exit 1)

  unit-tests:
    name: Unit Tests
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Block egress)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            checkpoint-api.hashicorp.com:443
            codeload.github.com:443
            github.com:443
            objects.githubusercontent.com:443
            proxy.golang.org:443
            raw.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            storage.googleapis.com:443
            sum.golang.org:443

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
        id: go
      - name: Tests
        run:
          go test -v -cover -failfast ./internal/utils

  # Run acceptance tests in a matrix with Terraform CLI versions
  provider-tests:
    name: Terraform Provider Acceptance Tests
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        terraform:
          - '1.5.7'
          - '1.7.5'
          - '1.9.8'
          - '1.10.5'
          - '1.11.4'
          - '1.12.2'
          - '1.14.3'
    steps:
      - name: Harden the runner (Block egress)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: block
          allowed-endpoints: >
            *.armis.com:443
            *.s3.amazonaws.com:443
            api.github.com:443
            checkpoint-api.hashicorp.com:443
            codeload.github.com:443
            github.com:443
            objects.githubusercontent.com:443
            proxy.golang.org:443
            raw.githubusercontent.com:443
            registry.terraform.io:443
            release-assets.githubusercontent.com:443
            releases.hashicorp.com:443
            storage.googleapis.com:443
            sum.golang.org:443

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2
        with:
          version: "3.x"
      - name: Install Terraform
        uses: step-security/setup-terraform@11f45fe036ccfd27d231861d38b183d405b059a9 # v4.0.0
        with:
          terraform_version: ${{ matrix.terraform }}
          terraform_wrapper: false
      - run: go mod download
      # Run sweep to ensure there are no dangling resources before running tests
      - name: Clean Environment
        env:
          ARMIS_API_URL: ${{ secrets.ARMIS_API_URL }}
          ARMIS_API_KEY: ${{ secrets.ARMIS_API_KEY }}
        run: task sweep
        timeout-minutes: 5
      - name: Run Acceptance Tests
        env:
          TF_ACC: "1"
          ARMIS_API_URL: ${{ secrets.ARMIS_API_URL }}
          ARMIS_API_KEY: ${{ secrets.ARMIS_API_KEY }}
        run: go test -v ./internal/provider/
        timeout-minutes: 10

  # Run sweeper after all test matrix jobs complete
  cleanup:
    name: Cleanup Dangling Resources
    needs: provider-tests
    runs-on: ubuntu-latest
    if: always()
    timeout-minutes: 10
    steps:
      - name: Harden the runner (Block egress)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: block
          allowed-endpoints: >
            *.armis.com:443
            api.github.com:443
            checkpoint-api.hashicorp.com:443
            codeload.github.com:443
            github.com:443
            objects.githubusercontent.com:443
            proxy.golang.org:443
            raw.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            storage.googleapis.com:443
            sum.golang.org:443

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: Install Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2
        with:
          version: "3.x"
      - run: go mod download
      - name: Run Sweeper
        env:
          ARMIS_API_URL: ${{ secrets.ARMIS_API_URL }}
          ARMIS_API_KEY: ${{ secrets.ARMIS_API_KEY }}
        run: task sweep
